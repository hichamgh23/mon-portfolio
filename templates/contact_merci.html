{% load static %}
{% load tz %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé — {% if gs %}{{ gs.nom_proprietaire }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }

        body {
            min-height: 100vh;
            background: #0b0b0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #131316;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: popIn .5s cubic-bezier(.22,.68,0,1.2);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(.88) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #c6f135;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.6rem;
        }

        .icon i { font-size: 2.2rem; color: #0b0b0d; }

        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #ededef;
            letter-spacing: -.02em;
            margin-bottom: .7rem;
        }

        p {
            font-size: .9rem;
            color: #9a9aa3;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: #c6f135;
            color: #0b0b0d;
            font-weight: 600;
            font-size: .88rem;
            padding: .8rem 2rem;
            border-radius: 999px;
            text-decoration: none;
            transition: opacity .2s, transform .2s;
        }

        a:hover {
            opacity: .85;
            transform: translateY(-2px);
            color: #0b0b0d;
        }

        .back-logo {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .85rem;
            font-weight: 700;
            color: rgba(255,255,255,.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .back-logo:hover { color: #ededef; }
    </style>
</head>
<body>

    {% if gs %}
    <a href="{% url 'home' %}" class="back-logo">
        <i class="bi bi-arrow-left"></i> {{ gs.nom_proprietaire }}
    </a>
    {% endif %}

    <div class="card">
        <div class="icon">
            <i class="bi bi-check2"></i>
        </div>
        <h1>Message envoyé !</h1>
        <p>
            Merci de m'avoir contacté.<br>
            Je vous répondrai dans les plus brefs délais.
        </p>
        <a href="{% url 'home' %}">
            <i class="bi bi-arrow-left-short" style="font-size:1.1rem;"></i>
            Retour à l'accueil
        </a>
    </div>

</body>
</html>
