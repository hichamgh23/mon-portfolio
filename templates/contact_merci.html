{% load static %}
{% load tz %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé — {% if gs %}{{ gs.nom_proprietaire }}{% endif %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #0369a1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0,0,0,.35);
            animation: popIn .5s cubic-bezier(.22,.68,0,1.2);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(.88) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.6rem;
            box-shadow: 0 8px 28px rgba(37,99,235,.45);
        }

        .icon i { font-size: 2.2rem; color: #fff; }

        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -.4px;
            margin-bottom: .7rem;
        }

        p {
            font-size: .9rem;
            color: #64748b;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: linear-gradient(135deg, #2563eb, #6366f1);
            color: #fff;
            font-weight: 700;
            font-size: .88rem;
            padding: .8rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 18px rgba(37,99,235,.4);
            transition: transform .2s, box-shadow .2s;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37,99,235,.5);
            color: #fff;
        }

        .back-logo {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            font-size: .85rem;
            font-weight: 700;
            color: rgba(255,255,255,.7);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .back-logo:hover { color: #fff; }
    </style>
</head>
<body>

    {% if gs %}
    <a href="{% url 'home' %}" class="back-logo">
        <i class="bi bi-arrow-left"></i> {{ gs.nom_proprietaire }}
    </a>
    {% endif %}

    <div class="card">
        <div class="icon">
            <i class="bi bi-check2"></i>
        </div>
        <h1>Message envoyé !</h1>
        <p>
            Merci de m'avoir contacté.<br>
            Je vous répondrai dans les plus brefs délais.
        </p>
        <a href="{% url 'home' %}">
            <i class="bi bi-arrow-left-short" style="font-size:1.1rem;"></i>
            Retour à l'accueil
        </a>
    </div>

</body>
</html>
